<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Select Folder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #f5f5f5; margin: 0; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .btn {
            padding: 12px 24px; font-size: 16px; background: #2196F3; color: white;
            border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn:hover { background: #1976D2; }
        .icon { font-size: 48px; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; color: #333; }
        p { margin: 0 0 8px 0; color: #666; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="icon">📁</div>
    <h3 id="statusTitle">Select Music Folder</h3>
    <p id="statusDesc">Click the button below to select a folder.</p>
    <button class="btn" id="pickBtn">Pick Folder</button>
    <script src="picker.js"></script>
</body>
</html>
