<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="player" id="player">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>🎵 AudioPlayer Pro</h3>
            <div style="position: relative; display: inline-block;">
                <button id="mainSettingsBtn" class="icon-btn" title="Settings">⚙️</button>
                <!-- Settings Dropdown -->
                <div id="settingsMenu" class="add-menu" style="display: none; right: 0; left: auto; top: 100%; margin-top: 5px; width: 170px;">
                    <div class="menu-label font-weight-bold" style="padding: 10px; border-bottom: 1px solid #eee;">⚙️ Settings</div>
                    <button class="menu-label" id="toggleThemeBtn" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">🌙 Dark Theme: Off</button>
                    <button class="menu-label" id="saveFavoriteBtn" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">⭐ Save Favorite</button>
                    <button class="menu-label" id="showCatalogBtn" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">📂 My Playlists</button>
                </div>
            </div>
        </div>
        <div class="player-top">
            <div class="cover">🎵</div>
            
            <div class="player-info-controls">
                <div class="song-details">
                    <h3 id="title">Select files</h3>
                    <p id="artist">AudioPlayer Pro</p>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="time">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls-row-main">
                    <div class="controls">
                        <button class="btn" id="prev">⏮</button>
                        <button class="btn btn-play" id="play">▶</button>
                        <button class="btn" id="next">⏭</button>
                    </div>

                    <div class="volume-container">
                        <span class="volume-icon">🔉</span>
                        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="1">
                    </div>
                </div>
            </div>
        </div>

        <div class="file-controls">
            <div class="controls-row">
                <div class="add-menu-container">
                    <button id="addMenuBtn" class="add-btn" title="Add Media">➕ Add</button>
                    <div id="addMenuContent" class="add-menu">
                        <label class="menu-label">
                            📄 Files
                            <input type="file" id="filesInput" multiple accept="audio/mp3,audio/wav,audio/ogg,audio/flac,audio/mp4" style="display:none">
                        </label>
                        <div class="menu-label" id="addFolderOption">📁 Folder</div>
                        <div style="border-top: 1px solid #eee; margin: 4px 0;"></div>
                        <label class="checkbox-label" title="Include files from subfolders" style="padding: 6px 15px;">
                            <input type="checkbox" id="includeSubfolders" checked>
                            Subfolders
                        </label>
                    </div>
                </div>
                <button id="loadPlaylistBtn" class="icon-btn" title="Load Playlist">📂</button>
                <button id="savePlaylistBtn" class="icon-btn" title="Save Playlist">💾</button>
            </div>
            
            <div class="controls-row">
                <button id="sortBtn">🔤 Sort</button>
                <button id="shuffleBtn">🔀 Shuffle</button>
                <button id="clearPlaylistBtn">🗑️ Clear</button>
            </div>
            
            <input type="file" id="audioFile" class="file-input" accept="audio/*" multiple style="display:none">
        </div>

        <div class="playlist-section">
            <div class="playlist-header">
                <h4>Playlist <span id="playlistCount" style="color: #666; font-size: 13px;">(0)</span></h4>
                <input type="text" id="playlistSearch" placeholder="Search..." class="playlist-search" title="Filter tracks">
                <button id="repeatBtn" class="small-icon-btn" title="Repeat Mode">➡</button>
                <div class="playlist-actions">
                </div>
            </div>
            <div class="playlist" id="playlist"></div>
        </div>

        <div class="status-bar" id="statusBar"></div>
    </div>

    

    <script src="popup.js"></script>
</body>
</html>
