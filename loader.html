<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка плейлиста</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #f5f5f5; margin: 0; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .icon { font-size: 48px; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; color: #333; }
        p { margin: 0 0 8px 0; color: #666; font-size: 14px; line-height: 1.4; }
        .progress { margin-top: 15px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="icon">📂</div>
    <h3 id="statusTitle">Загрузка плейлиста</h3>
    <p id="statusDesc">Chrome запросит разрешение на доступ к вашим папкам.</p>
    <button id="startBtn" style="padding: 12px 24px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">Восстановить плейлист</button>
    <p id="progress" class="progress"></p>
    <script src="loader.js"></script>
</body>
</html>
